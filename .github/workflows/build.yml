name: Build KeyCount

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4

    - name: Build App
      run: |
        # Компилируем в Release
        swift build -c release
        
        # Создаем папку приложения по стандартам macOS
        mkdir -p KeyCount.app/Contents/MacOS
        
        # Копируем бинарник внутрь приложения
        cp .build/release/KeyCount KeyCount.app/Contents/MacOS/KeyCount
        
        # Создаем минимальный Info.plist
        cat <<EOF > KeyCount.app/Contents/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>KeyCount</string>
            <key>CFBundleIdentifier</key>
            <string>com.yourname.KeyCount</string>
            <key>CFBundleName</key>
            <string>KeyCount</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSAccessibilityUsageDescription</key>
            <string>KeyCount needs Accessibility access to track your keystroke statistics.</string>
            <key>NSInputMonitoringUsageDescription</key>
            <string>KeyCount needs Input Monitoring access to count your keystrokes for productivity stats.</string>
        </dict>
        </plist>
        EOF
        
        # Запаковываем все в ZIP
        zip -r KeyCount.zip KeyCount.app

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KeyCount-Build
        path: KeyCount.zip
